basePath: /
definitions:
  auth.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  auth.MessageResponse:
    properties:
      message:
        type: string
    type: object
  auth.RecoverAccessRequest:
    properties:
      email:
        maxLength: 254
        type: string
    required:
    - email
    type: object
  auth.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
info:
  contact: {}
  description: Admin authentication API documentation.
  title: Share Bite Admin Auth API
  version: "1.0"
paths:
  /auth/recover-access:
    post:
      consumes:
      - application/json
      description: Sends password reset instructions if account exists
      parameters:
      - description: Recover access payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RecoverAccessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Recover access
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets password by token
      parameters:
      - description: Reset password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Reset password
      tags:
      - auth
swagger: "2.0"
