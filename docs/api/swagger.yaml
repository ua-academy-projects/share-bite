basePath: /
definitions:
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.OAuthCallbackRequest:
    properties:
      code:
        type: string
      slug:
        enum:
        - user
        - business
        type: string
    required:
    - code
    - slug
    type: object
  auth.OAuthLinkRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.RegisterRequest:
    properties:
      email:
        maxLength: 254
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      slug:
        enum:
        - user
        - business
        type: string
    required:
    - email
    - password
    - slug
    type: object
host: localhost:3850
info:
  contact: {}
  description: This is an authentication microservice for Share Bite.
  title: Share Bite Admin Auth API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Перевіряє email та пароль.
      parameters:
      - description: Дані для входу
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Успіх. Повертає JSON: {''access_token'': ''...'', ''refresh_token'':
            ''...''}'
          schema:
            type: object
        "400":
          description: 'Помилка валідації: {''error'': ''...''}'
          schema:
            type: object
        "401":
          description: 'Невірні облікові дані: {''error'': ''...''}'
          schema:
            type: object
        "500":
          description: 'Внутрішня помилка сервера: {''error'': ''...''}'
          schema:
            type: object
      summary: Авторизація користувача
      tags:
      - Auth
  /auth/oauth/{provider}/callback:
    post:
      consumes:
      - application/json
      description: Обмінює код від провайдера на токени доступу.
      parameters:
      - description: Назва провайдера (google)
        in: path
        name: provider
        required: true
        type: string
      - description: Код від провайдера та роль
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.OAuthCallbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Успіх. Повертає JSON: {''access_token'': ''...'', ''refresh_token'':
            ''...''}'
          schema:
            type: object
        "400":
          description: 'Непідтримуваний провайдер: {''error'': ''...''}'
          schema:
            type: object
        "422":
          description: 'Роль не знайдена: {''error'': ''...''}'
          schema:
            type: object
        "500":
          description: 'Внутрішня помилка сервера: {''error'': ''...''}'
          schema:
            type: object
        "502":
          description: 'Помилка обміну коду з провайдером: {''error'': ''...''}'
          schema:
            type: object
      summary: OAuth Авторизація / Реєстрація
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Генерує нову пару токенів на основі валідного refresh_token.
      parameters:
      - description: Refresh токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Успіх. Повертає JSON: {''access_token'': ''...'', ''refresh_token'':
            ''...''}'
          schema:
            type: object
        "400":
          description: 'Помилка валідації: {''error'': ''...''}'
          schema:
            type: object
        "401":
          description: 'Невалідний або прострочений токен: {''error'': ''...''}'
          schema:
            type: object
        "500":
          description: 'Внутрішня помилка сервера: {''error'': ''...''}'
          schema:
            type: object
      summary: Оновлення токенів
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Створює нового користувача та одразу повертає пару токенів.
      parameters:
      - description: Дані для реєстрації
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 'Успіх. Повертає JSON: {''access_token'': ''...'', ''refresh_token'':
            ''...''}'
          schema:
            type: object
        "400":
          description: 'Помилка валідації: {''error'': ''...''}'
          schema:
            type: object
        "409":
          description: 'Користувач вже існує: {''error'': ''...''}'
          schema:
            type: object
        "422":
          description: 'Роль не знайдена: {''error'': ''...''}'
          schema:
            type: object
        "500":
          description: 'Внутрішня помилка сервера: {''error'': ''...''}'
          schema:
            type: object
      summary: Реєстрація користувача
      tags:
      - Auth
  /user/link/{provider}:
    post:
      consumes:
      - application/json
      description: Прив'язує Google або GitHub до вже авторизованого користувача.
      parameters:
      - description: Назва провайдера (google)
        in: path
        name: provider
        required: true
        type: string
      - description: Код від провайдера
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.OAuthLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Успіх. Повертає: {''message'': ''Social account successfully
            linked.''}'
          schema:
            type: object
        "400":
          description: 'Невалідний запит: {''error'': ''...''}'
          schema:
            type: object
        "401":
          description: 'Неавторизований доступ: {''error'': ''...''}'
          schema:
            type: object
        "409":
          description: 'Провайдер вже прив''язаний: {''error'': ''...''}'
          schema:
            type: object
        "500":
          description: 'Внутрішня помилка сервера: {''error'': ''...''}'
          schema:
            type: object
        "502":
          description: 'Помилка обміну коду з провайдером: {''error'': ''...''}'
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Прив'язка соцмережі до акаунту
      tags:
      - User
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
