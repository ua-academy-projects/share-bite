apiVersion: v1
kind: Secret
metadata:
  name: share-bite-secrets
  namespace: share-bite-local
type: Opaque
stringData:
  # Replace these placeholders in your local copy before applying.
  # Database / cache
  POSTGRES_PASSWORD: change-me-postgres-password
  REDIS_PASSWORD: change-me-redis-password

  # JWT
  JWT_ACCESS_TOKEN_SECRET_KEY: change-me-access-token-secret
  JWT_REFRESH_TOKEN_SECRET_KEY: change-me-refresh-token-secret

  # OAuth providers
  GOOGLE_CLIENT_ID: change-me-google-client-id
  GOOGLE_CLIENT_SECRET: change-me-google-client-secret
  GITHUB_CLIENT_ID: change-me-github-client-id
  GITHUB_CLIENT_SECRET: change-me-github-client-secret

  # Email provider (Resend)
  RESEND_API_KEY: change-me-resend-api-key
  RESEND_FROM_EMAIL: onboarding@resend.dev

  # S3 credentials (optional for local Garage, usually empty when IAM is used)
  S3_ACCESS_KEY: change-me-s3-access-key
  S3_SECRET_KEY: change-me-s3-secret-key
