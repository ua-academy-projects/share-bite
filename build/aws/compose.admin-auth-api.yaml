services:
  admin-api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/admin-auth-api:${IMAGE_TAG:-latest}
    container_name: share-bite-admin-api
    restart: always
    env_file:
      - .env
    ports:
      - "8080:3850"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /lib64/ld-linux-x86-64.so.2:/lib64/ld-linux-x86-64.so.2:ro
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro
  redis:
    image: redis:7-alpine
    container_name: share-bite-redis-admin
    restart: always
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --protected-mode no
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5