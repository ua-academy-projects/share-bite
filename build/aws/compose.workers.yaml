services:
  notifications:
    image: 897201144750.dkr.ecr.us-east-2.amazonaws.com/share-bite/notifications-service:sha-ed1c83b
    container_name: share-bite-notifications
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /lib64/ld-linux-x86-64.so.2:/lib64/ld-linux-x86-64.so.2:ro
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro

  outbox:
    image: 897201144750.dkr.ecr.us-east-2.amazonaws.com/share-bite/outbox-worker:sha-ed1c83b
    container_name: share-bite-outbox
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /lib64/ld-linux-x86-64.so.2:/lib64/ld-linux-x86-64.so.2:ro
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro

  redis:
    image: redis:7-alpine
    container_name: share-bite-redis-workers
    restart: always
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --protected-mode no
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5