version: '3.8'

services:
  business-api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/business-api:${IMAGE_TAG}
    container_name: share-bite-business-api
    restart: always
    network_mode: "host"
    env_file:
      - .env
    environment:
      - IMAGE_TAG=${IMAGE_TAG:?IMAGE_TAG is required}
      - AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID is required}
      - AWS_REGION=${AWS_REGION:?AWS_REGION is required}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /lib64/ld-linux-x86-64.so.2:/lib64/ld-linux-x86-64.so.2:ro
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro

  redis:
    image: redis:7-alpine
    container_name: share-bite-redis-business
    restart: always
    network_mode: "host"
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5