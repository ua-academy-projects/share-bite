apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
    name: businessappprofiles.business.sharebite.dev
spec:
    group: business.sharebite.dev
    names:
        kind: BusinessAppProfile
        plural: businessappprofiles
        singular: businessappprofile
    scope: Namespaced
    versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
            type: object
            properties:
                spec:
                    type: object
                    properties:
                        replicas:
                            description: number of working pods
                            type: integer
                            format: int32
                        enabled:
                            description: is any pods working
                            type: boolean
                        deploymentName:
                            description: name of target Deployment
                            type: string       
                status:
                    type: object
                    properties:
                        conditions:
                            type: array
                            items:
                                type: object
                                properties:
                                    type: 
                                        type: string
                                    status:
                                        type: string
                                    reason:
                                        type: string
                                    lastTransitionTime:
                                        type: string
                                        format: date-time