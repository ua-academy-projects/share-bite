name: s3
services:
  s3:
    image: dxflrs/garage:v2.0.0
    container_name: s3
    restart: unless-stopped
    ports:
      - "4300:4300"
      - "4303:4303"
    volumes:
      - ../garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    environment:
      RUST_LOG: garage=info
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - share-bite-net

  garage_webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    ports:
      - "4309:4309"
    volumes:
      - ../garage.toml:/etc/garage.toml:ro
    environment:
      API_BASE_URL: "http://s3:4303"
      S3_ENDPOINT_URL: "http://s3:4300"
    depends_on:
      - s3
    networks:
      - share-bite-net

volumes:
  garage_meta:
  garage_data:

networks:
  share-bite-net:
    driver: bridge
