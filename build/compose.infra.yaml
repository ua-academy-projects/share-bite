name: share-bite-infra
services:
  pg:
    image: postgres:18
    container_name: share-bite-pg
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - share-bite-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: share-bite-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGPASSFILE: /config/pgpass
    configs:
      - source: pgadmin-servers
        target: /pgadmin4/servers.json
      - source: pgadmin-pgpass
        target: /config/pgpass
        uid: "5050"
        gid: "5050"
        mode: "0400"
    depends_on:
      pg:
        condition: service_healthy
    networks:
      - share-bite-net
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7.4-alpine
    container_name: share-bite-redis
    ports:
      - '${REDIS_PORT}:6379'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ../redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    networks:
      - share-bite-net
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --raw ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: share-bite-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns,sqs
      DEFAULT_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - share-bite-net
    healthcheck:
      test: ["CMD-SHELL", "awslocal sns list-topics >/dev/null 2>&1 && awslocal sqs list-queues >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  prometheus:
    image: prom/prometheus:v3.5.4
    container_name: share-bite-prometheus
    restart: on-failure
    ports:
      - "${PROMETHEUS_PORT}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

volumes:
  pg_data:
  pgadmin_data:
  localstack-data:
  redis-data:
    driver: local
  prometheus_data:

configs:
  pgadmin-servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "Share Bite DB",
            "Group": "Servers",
            "Host": "pg",
            "Port": 5432,
            "MaintenanceDB": "${POSTGRES_DB}",
            "Username": "${POSTGRES_USER}",
            "PassFile": "/config/pgpass"
          }
        }
      }
  pgadmin-pgpass:
    content: |
      *:5432:*:*:${POSTGRES_PASSWORD}
