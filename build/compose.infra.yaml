name: share-bite-infra
services:
  pg:
    image: postgres:18
    container_name: share-bite-pg
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - share-bite-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: share-bite-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGPASSFILE: /config/pgpass
    configs:
      - source: pgadmin-servers
        target: /pgadmin4/servers.json
      - source: pgadmin-pgpass
        target: /config/pgpass
        uid: "5050"
        gid: "5050"
        mode: "0400"
    depends_on:
      pg:
        condition: service_healthy
    networks:
      - share-bite-net
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_AOF=${REDIS_AOF}
    command:
      redis-server 
      --requirepass ${REDIS_PASSWORD} 
      --appendonly ${REDIS_AOF}
    restart: unless-stopped

volumes:
  pg_data:
  pgadmin_data:
  redis-data:
    driver: local

configs:
  pgadmin-servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "Share Bite DB",
            "Group": "Servers",
            "Host": "pg",
            "Port": 5432,
            "MaintenanceDB": "${POSTGRES_DB}",
            "Username": "${POSTGRES_USER}",
            "PassFile": "/config/pgpass"
          }
        }
      }
  pgadmin-pgpass:
    content: |
      *:5432:*:*:${POSTGRES_PASSWORD}