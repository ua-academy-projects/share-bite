name: share-bite-apps
services:
  guest:
    container_name: guest
    restart: on-failure
    build:
      context: ../
      dockerfile: build/Dockerfile.guest
    ports:
      - ${GUEST_HTTP_SERVER_PORT}:${GUEST_HTTP_SERVER_PORT}
    env_file:
      - ../.env
    volumes:
      - ../.env:/app/.env
    depends_on:
      - pg
    networks:
      - share-bite-net

  admin:
    container_name: admin
    restart: on-failure
    build:
      context: ../
      dockerfile: build/Dockerfile.admin
    ports:
      - ${ADMIN_HTTP_SERVER_PORT}:${ADMIN_HTTP_SERVER_PORT}
    env_file:
      - ../.env
    volumes:
      - ../.env:/app/.env
      - ../internal/admin-auth/provider/email/templates:/app/internal/admin-auth/provider/email/templates
    depends_on:
      - pg
    networks:
      - share-bite-net

  business:
    container_name: business
    restart: on-failure
    build:
      context: ../
      dockerfile: build/Dockerfile.business
    ports:
      - ${BUSINESS_HTTP_SERVER_PORT}:${BUSINESS_HTTP_SERVER_PORT}
    env_file:
      - ../.env
    volumes:
      - ../.env:/app/.env
    depends_on:
      - pg
    networks:
      - share-bite-net