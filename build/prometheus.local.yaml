# This file is used only for development purposes
# when applications are running outside Docker containers.

global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    scrape_interval: 5s
    scrape_timeout: 5s

    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "guest-service"
    scrape_interval: 5s
    scrape_timeout: 5s

    static_configs:
      - targets: ["host.docker.internal:3800"]

  - job_name: "admin-auth-service"
    scrape_interval: 5s
    scrape_timeout: 5s

    static_configs:
      - targets: ["host.docker.internal:3850"]

  - job_name: "business-service"
    scrape_interval: 5s
    scrape_timeout: 5s

    static_configs:
      - targets: ["host.docker.internal:3900"]
