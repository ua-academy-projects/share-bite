apiVersion: v1
kind: ConfigMap
metadata:
  name: share-bite-infra-config
  namespace: share-bite-local
data:
  APP_NAME: share-bite
  APP_STAGE: dev
  APP_GRACEFUL_SHUTDOWN_TIMEOUT: 15s
  GUEST_HTTP_SERVER_HOST: 0.0.0.0
  GUEST_HTTP_SERVER_PORT: "3800"
  ADMIN_HTTP_SERVER_HOST: 0.0.0.0
  ADMIN_HTTP_SERVER_PORT: "3850"
  BUSINESS_HTTP_SERVER_HOST: 0.0.0.0
  BUSINESS_HTTP_SERVER_PORT: "3900"
  NOTIFICATION_HTTP_SERVER_HOST: 0.0.0.0
  NOTIFICATION_HTTP_SERVER_PORT: "4005"
  BUSINESS_HTTP_CLIENT_BASE_URL: localhost:3900
  BUSINESS_HTTP_CLIENT_SCHEME: http
  AUTH_MAX_SESSIONS: "5"
  JWT_ACCESS_TOKEN_TTL: 5m
  JWT_REFRESH_TOKEN_TTL: 4320m
  GOOGLE_REDIRECT_URI: http://localhost:5173/
  GITHUB_REDIRECT_URL: http://localhost:3000/oauth/callback
  GITHUB_SUCCESS_REDIRECT_URL: http://localhost:3000/auth/github/success
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_SSL: disable
  POSTGRES_USER: share
  POSTGRES_DB: share-bite
  POSTGRES_MIGRATIONS_DIR: migrations
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  S3_REGION: garage
  S3_BUCKET: app-dev-bucket
  # S3_ENDPOINT must be configured for your environment - see docs/k8s/business-api.md
  # Docker Desktop (macOS/Windows): http://host.docker.internal:4300
  # Linux: http://172.17.0.1:4300 (or your bridge IP)
  # In-cluster Garage: http://garage:4300
  S3_ENDPOINT: http://host.docker.internal:4300