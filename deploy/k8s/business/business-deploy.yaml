apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-api
  namespace: share-bite-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: business-api
  template:
    metadata:
      labels:
        app: business-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: business-api
          image: business-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          ports:
            - containerPort: 3900
          envFrom:
            - configMapRef:
                name: share-bite-infra-config
            - configMapRef:
                name: share-bite-business-config
            - secretRef:
                name: share-bite-secrets
          env:
            - name: POSTGRES_HOST
              value: share-bite-cnpg-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: share-bite-cnpg-app
                  key: dbname
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: share-bite-cnpg-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: share-bite-cnpg-app
                  key: password
          readinessProbe:
            httpGet:
              path: /business/ready
              port: 3900
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /business/healthz
              port: 3900
            initialDelaySeconds: 15
            periodSeconds: 20
