apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: guestappprofiles.guest.sharebite.dev
spec:
  group: guest.sharebite.dev
  names:
    kind: GuestAppProfile
    listKind: GuestAppProfileList
    plural: guestappprofiles
    singular: guestappprofile
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  format: int32
                enabled:
                  type: boolean
                deploymentName:
                  type: string
              required:
                - replicas
                - enabled
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time