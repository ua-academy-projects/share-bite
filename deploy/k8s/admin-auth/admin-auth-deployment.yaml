apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-auth-api
  namespace: share-bite-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-auth-api
  template:
    metadata:
      labels:
        app: admin-auth-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin-auth-api
          image: admin-auth-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3850
          envFrom:
            - configMapRef:
                name: share-bite-infra-config
            - configMapRef:
                name: admin-auth-config
            - secretRef:
                name: share-bite-secrets
          env:
            - name: POSTGRES_HOST
              value: share-bite-cnpg-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: share-bite-cnpg-app
                  key: dbname
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: share-bite-cnpg-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: share-bite-cnpg-app
                  key: password
          livenessProbe:
            httpGet:
              path: /health
              port: 3850
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3850
            initialDelaySeconds: 5
            periodSeconds: 5
