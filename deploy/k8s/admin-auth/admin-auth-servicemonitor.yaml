apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: admin-auth-api-monitor
  namespace: share-bite-local
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - share-bite-local
  selector:
    matchLabels:
      app: admin-auth-api
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
