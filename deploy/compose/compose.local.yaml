name: compose.local.yaml
services:
  frontend:
    build:
      context: .
      dockerfile: build/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=http://52.15.42.12:8080
    container_name: share-bite-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - admin-api
      - business-api
      - guest-api
    networks:
      - share-bite-network
  postgres:
    image: postgres:18-alpine
    container_name: share-bite-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sharebite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-sharebite_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - share-bite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharebite} -d ${POSTGRES_DB:-sharebite_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: share-bite-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-rbite}
    ports:
      - "6379:6379"
    networks:
      - share-bite-network
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-rbite} ping | grep PONG" ]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.5.4
    container_name: share-bite-prometheus
    restart: on-failure
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../../build/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  migrator:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/migrator:${IMAGE_TAG:-latest}
    container_name: share-bite-migrator
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-sharebite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-sharebite_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - share-bite-network

  admin-api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/admin-auth-api:${IMAGE_TAG:-latest}
    container_name: share-bite-admin-api
    restart: always
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      OUTBOX_SNS_TOPIC_ARN: ${OUTBOX_SNS_TOPIC_ARN}
    ports:
      - "8080:3850"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - share-bite-network

  business-api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/business-api:${IMAGE_TAG:-latest}
    container_name: share-bite-business-api
    restart: always
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OUTBOX_SNS_TOPIC_ARN: ${OUTBOX_SNS_TOPIC_ARN}
    ports:
      - "8081:3900"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - share-bite-network

  guest-api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/guest-api:${IMAGE_TAG:-latest}
    container_name: share-bite-guest-api
    restart: always
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OUTBOX_SNS_TOPIC_ARN: ${OUTBOX_SNS_TOPIC_ARN}
    ports:
      - "8082:3800"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - share-bite-network

  notifications:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/notifications-service:${IMAGE_TAG:-latest}
    container_name: share-bite-notifications
    restart: always
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NOTIFICATION_SQS_QUEUE_URL: ${NOTIFICATION_SQS_QUEUE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - share-bite-network

  outbox:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/share-bite/outbox-worker:${IMAGE_TAG:-latest}
    container_name: share-bite-outbox
    restart: always
    environment:
      POSTGRES_HOST: postgres
      OUTBOX_SNS_TOPIC_ARN: ${OUTBOX_SNS_TOPIC_ARN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - share-bite-network

networks:
  share-bite-network:
    driver: bridge

volumes:
  pgdata:
