name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest
      - name: Generate swagger
        run: swag init -g cmd/business-api/main.go -o docs/api
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -v ./...
