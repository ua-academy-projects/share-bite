name: Build and Deploy Frontend to Proxy EC2

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'build/Dockerfile.frontend'
      - 'build/aws/compose.frontend.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'build/Dockerfile.frontend'
      - 'build/aws/compose.frontend.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
  ECR_REPO: share-bite/frontend

jobs:
  build-and-push-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Image Tag Variable
        id: vars
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.sha_tag }}
            latest

      - name: Build and push Frontend image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-frontend:
    name: Deploy Frontend via AWS SSM
    needs: build-and-push-frontend
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Deploy to Proxy EC2
        run: |
          FRONTEND_COMPOSE_B64=$(base64 -w 0 build/aws/compose.frontend.yaml)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.PROXY_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "cd /home/ubuntu/api-gateway",
              "echo '"$FRONTEND_COMPOSE_B64"' | base64 -d > compose.frontend.yaml",
              "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
              "export AWS_REGION=${{ env.AWS_REGION }}",
              "export IMAGE_TAG=${{ needs.build-and-push-frontend.outputs.image_tag }}",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker compose -f compose.frontend.yaml pull",
              "docker compose -f compose.frontend.yaml up -d"
            ]')
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.PROXY_INSTANCE_ID }}"