name: Build and Deploy Frontend to Proxy EC2

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'build/Dockerfile.frontend'
      - 'deploy/compose/compose.frontend.yaml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
  ECR_REPO: share-bite/frontend

jobs:
  build-and-push-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}
          tags: |
            type=sha,prefix=sha-
            type=sha,format=long
            latest

      - name: Build and push Frontend image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile.frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=http://3.135.191.160
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-frontend:
    name: Deploy Frontend via AWS SSM
    needs: build-and-push-frontend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Proxy EC2
        run: |
          FRONTEND_COMPOSE_B64=$(base64 -w 0 deploy/compose/compose.frontend.yaml)
          
          aws ssm send-command \
            --instance-ids "${{ secrets.PROXY_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              ""cd /home/ubuntu/api-gateway"",
              "echo '"$FRONTEND_COMPOSE_B64"' | base64 -d > compose.frontend.yaml",
              "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
              "export AWS_REGION=${{ env.AWS_REGION }}",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker compose -f compose.frontend.yaml pull",
              "docker compose -f compose.frontend.yaml up -d"
            ]'