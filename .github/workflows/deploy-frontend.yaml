name: Build and Deploy Frontend to Proxy EC2

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'build/Dockerfile.frontend'
      - 'build/aws/compose.frontend.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
  ECR_REPO: share-bite/frontend

jobs:
  build-and-push-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d44e03b00a1 # v4.0.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4e31aafaa4ae241a4a1275 # v2.0.1

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.5.1
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}
          tags: |
            type=sha,prefix=sha-
            type=sha,format=long
            latest

      - name: Build and push Frontend image
        id: build-push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v5.1.0
        with:
          context: .
          file: ./build/Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-frontend:
    name: Deploy Frontend via AWS SSM
    needs: build-and-push-frontend
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d44e03b00a1 # v4.0.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Proxy EC2
        run: |
          FRONTEND_COMPOSE_B64=$(base64 -w 0 build/aws/compose.frontend.yaml)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.PROXY_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "cd /home/ubuntu/api-gateway",
              "echo '"$FRONTEND_COMPOSE_B64"' | base64 -d > compose.frontend.yaml",
              "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
              "export AWS_REGION=${{ env.AWS_REGION }}",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker compose -f compose.frontend.yaml pull",
              "docker compose -f compose.frontend.yaml up -d"
            ]')
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.PROXY_INSTANCE_ID }}"