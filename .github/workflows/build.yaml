name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin
            ecr_repo: share-bite/admin-auth-api
          - service: business
            ecr_repo: share-bite/business-api
          - service: guest
            ecr_repo: share-bite/guest-api
          - service: migrator
            ecr_repo: share-bite/migrator
          - service: notifications-lambda
            ecr_repo: share-bite/notifications-worker
            platform: linux/arm64
          - service: notifications
            ecr_repo: share-bite/notifications-service
          - service: outbox
            ecr_repo: share-bite/outbox-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate swagger
        run: make generate

      - name: Configure AWS credentials (OIDC Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/build-push-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}
          tags: |
            type=sha,prefix=sha-
            type=sha,format=long

      - name: Build and push ${{ matrix.service }} image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile.${{ matrix.service }}
          platforms: ${{ matrix.platform || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output Pushed Image URI
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}@${{ steps.build-push.outputs.digest }}"
          echo "Successfully pushed to: $IMAGE_URI"
          echo "**${{ matrix.service }}**: \`$IMAGE_URI\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Distributed Deploy to Multi-EC2 via AWS SSM
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Database Migrations on Admin EC2
        run: |
          echo "Syncing config and starting database migrations..."
          MIGRATOR_COMPOSE_B64=$(base64 -w 0 build/aws/compose.migrator.yaml)
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.ADMIN_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "cd /root",
              "echo '"$MIGRATOR_COMPOSE_B64"' | base64 -d > compose.migrator.yaml",
              "aws ecr get-login-password --region '${{ env.AWS_REGION }}' | docker login --username AWS --password-stdin '${{ secrets.AWS_ACCOUNT_ID }}'.dkr.ecr.'${{ env.AWS_REGION }}'.amazonaws.com",
              "docker compose -f compose.migrator.yaml pull migrator",
              "docker compose -f compose.migrator.yaml up --abort-on-container-exit --exit-code-from migrator"
            ]')
          
          echo "Waiting for migrations to complete on remote host..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.ADMIN_INSTANCE_ID }}"

      - name: Deploy Admin Services
        run: |
          echo "Deploying Admin services to Admin EC2..."
          ADMIN_COMPOSE_B64=$(base64 -w 0 build/aws/compose.admin-auth-api.yaml)
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.ADMIN_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "cd /root",
              "echo '"$ADMIN_COMPOSE_B64"' | base64 -d > compose.admin-auth-api.yaml",
              "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
              "export AWS_REGION=${{ env.AWS_REGION }}",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker compose -f compose.admin-auth-api.yaml pull",
              "docker compose -f compose.admin-auth-api.yaml up -d"
            ]')
          
          echo "Waiting for Admin services to roll out..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.ADMIN_INSTANCE_ID }}"

      - name: Deploy Business Services
        run: |
          echo "Deploying Business services to Business EC2..."
          BUSINESS_COMPOSE_B64=$(base64 -w 0 build/aws/compose.business-api.yaml)
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.BUSINESS_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "cd /home/ubuntu/share-bite",
              "echo '"$BUSINESS_COMPOSE_B64"' | base64 -d > compose.business-api.yaml",
              "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
              "export AWS_REGION=${{ env.AWS_REGION }}",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker compose -f compose.business-api.yaml pull",
              "docker compose -f compose.business-api.yaml up -d"
            ]')
          
          echo "Waiting for Business services to roll out..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.BUSINESS_INSTANCE_ID }}"

      - name: Deploy Guest Services
        run: |
          echo "Deploying Guest services to Guest EC2..."
          GUEST_COMPOSE_B64=$(base64 -w 0 build/aws/compose.guest-api.yaml)
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.GUEST_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "cd /home/ubuntu/share-bite",
              "echo '"$GUEST_COMPOSE_B64"' | base64 -d > compose.guest-api.yaml",
              "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
              "export AWS_REGION=${{ env.AWS_REGION }}",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker compose -f compose.guest-api.yaml pull",
              "docker compose -f compose.guest-api.yaml up -d"
            ]')
          
          echo "Waiting for Guest services to roll out..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.GUEST_INSTANCE_ID }}"

      - name: Deploy Workers & Outbox Services
        run: |
          echo "Deploying Workers services to Workers EC2..."
          WORKERS_COMPOSE_B64=$(base64 -w 0 build/aws/compose.workers.yaml)
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.WORKERS_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "mkdir -p /home/ubuntu/share-bite",
              "cd /home/ubuntu/share-bite",
              "echo '"$WORKERS_COMPOSE_B64"' | base64 -d > workers.yaml",
              "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
              "export AWS_REGION=${{ env.AWS_REGION }}",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker compose -f workers.yaml pull",
              "docker compose -f workers.yaml up -d"
            ]')
          
          echo "Waiting for Workers to roll out..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.WORKERS_INSTANCE_ID }}"